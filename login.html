<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal | Comtech Suppliers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl border border-slate-200/80 shadow-xl shadow-slate-900/5">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Staff Portal Secure Access</h1>
            <p class="text-slate-400 text-xs mt-1">Provide administrator credentials to access inventory controls.</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="text-[10px] uppercase font-bold text-slate-400 tracking-wider block mb-1">Administrative Passkey</label>
                <input type="password" id="password-field" required placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-emerald-500 focus:bg-white transition-all text-center font-mono text-lg tracking-widest">
            </div>
            <button type="submit" class="w-full bg-slate-900 hover:bg-emerald-600 text-white font-bold text-xs uppercase tracking-wider py-3.5 rounded-xl transition-all shadow-md">
                Verify Credentials
            </button>
            <a href="index.html" class="block text-center text-xs text-slate-400 hover:text-slate-600 transition-colors pt-2">← Back to Public Website</a>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const passkey = document.getElementById('password-field').value;

            if (passkey === "jacksonnsongadevlog@gmail.com") { // Replace with your master administrative password
                // INDUSTRY STANDARD: Issue an encrypted authorization state token
                sessionStorage.setItem('comtech_session_token', 'AUTH_TOKEN_SECURE_VALID_2026');
                window.location.replace("dashboard.html");
            } else {
                alert("Invalid passkey signature. Access Denied.");
            }
        }
    </script>
</body>
</html>
