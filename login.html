<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Core Console | Comtech Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #F1F5F9; }
        html, body { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen">

    <div id="login-view" class="min-h-screen flex flex-col justify-between transition-opacity duration-300">
        <header class="p-6">
            <a href="index.html" class="inline-flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-slate-500 hover:text-white transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 transition-transform group-hover:-translate-x-1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
                Exit Gateway
            </a>
        </header>

        <main class="w-full max-w-md mx-auto px-6 py-12">
            <div class="bg-slate-900/50 border border-slate-900 p-8 rounded-3xl backdrop-blur-xl">
                <div class="text-center mb-8">
                    <img src="assets/images/logo1.png" alt="Comtech Logo" class="h-12 mx-auto mb-4 filter brightness-110">
                    <h2 class="text-xl font-extrabold text-white uppercase tracking-tight">Comtech <span class="text-emerald-400">Portal</span></h2>
                    <p class="text-slate-500 text-xs mt-1">Authorized corporate identity terminal verification.</p>
                </div>

                <form id="auth-gate-form" onsubmit="LoginEngine.handleLoginSubmit(event)" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">System Token Identifier</label>
                        <input type="text" id="login-email" required placeholder="e.g. clintadmin" class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-700 outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">Access Key Cipher</label>
                        <input type="password" id="login-cipher" required placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-700 outline-none transition-colors">
                    </div>
                    
                    <div id="auth-error-log" class="text-xs text-rose-400 font-semibold hidden tracking-wide bg-rose-950/20 border border-rose-900/30 rounded-xl px-4 py-2.5"></div>

                    <button type="submit" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold uppercase text-xs tracking-widest transition-all shadow-md shadow-emerald-950/40">
                        Verify Credentials
                    </button>
                </form>
            </div>
        </main>

        <footer class="p-6 text-center text-[10px] text-slate-700 uppercase tracking-widest">
            Secure Pipeline Framework &copy; 2026
        </footer>
    </div>

    <script>
        const LoginEngine = {
            state: {
                secureIdentifier: 'clintadmin', 
                secureToken: 'clint82'          
            },

            handleLoginSubmit(e) {
                e.preventDefault();
                const tokenInput = document.getElementById('login-email').value.trim();
                const cipherInput = document.getElementById('login-cipher').value;
                const errorLog = document.getElementById('auth-error-log');

                if (tokenInput === this.state.secureIdentifier && cipherInput === this.state.secureToken) {
                    // Set secure session state key
                    sessionStorage.setItem('comtech_session_token', 'AUTH_TOKEN_SECURE_VALID_2026');
                    errorLog.classList.add('hidden');
                    
                    // Redirect directly to your standalone dashboard file
                    window.location.replace("dashboard.html");
                } else {
                    errorLog.textContent = "Access Denied: Invalid administrative token or cipher matching parameters.";
                    errorLog.classList.remove('hidden');
                }
            }
        };
    </script>
</body>
</html>
