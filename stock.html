<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Inventory | Comtech Suppliers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; }</style>
</head>
<body class="pt-24">

    <nav class="fixed top-0 left-0 w-full z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/60">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <a href="index.html" class="flex items-center gap-3 group">
                <img src="assets/images/logo1.png" alt="Comtech Logo" class="h-14 w-auto rounded-none transition-transform group-hover:scale-105">
                <div class="hidden md:flex flex-col justify-center">
                    <span class="text-slate-900 font-extrabold text-lg uppercase tracking-tight">Comtech <span class="text-emerald-600">Suppliers</span></span>
                    <span class="text-[9px] tracking-[0.3em] text-slate-400 uppercase font-semibold">Workspace Infrastructure</span>
                </div>
            </a>
            <div class="flex items-center space-x-8 text-xs uppercase tracking-widest font-semibold">
                <a href="index.html" class="text-slate-600 hover:text-emerald-600 transition-colors">Home Hub</a>
                <a href="stock.html" class="text-emerald-600">What's In Stock</a>
                <a href="contact.html" class="text-slate-600 hover:text-emerald-600 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <section class="py-16 px-6 max-w-7xl mx-auto">
        <div class="mb-12 border-b border-slate-200 pb-6">
            <span class="text-xs uppercase tracking-[0.25em] text-emerald-600 font-bold block mb-2">Live Corporate Inventory</span>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Current Warehouse Stock Levels</h1>
        </div>
        <div id="inventory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>

    <script>
        function getStockManifest() {
            const currentData = localStorage.getItem('comtech_inventory_manifest');
            return currentData ? JSON.parse(currentData) : [];
        }

        function renderStockInterface() {
            const manifest = getStockManifest();
            const publicGrid = document.getElementById('inventory-grid');
            if (!publicGrid) return;
            publicGrid.innerHTML = '';

            if (manifest.length === 0) {
                publicGrid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-sm font-medium">No items currently dispatched in live system ledger.</div>`;
                return;
            }

            manifest.forEach(item => {
                const isLowStock = item.status.includes('Low') || item.status.includes('Out');
                const badgeColorClass = isLowStock ? 'bg-amber-50 text-amber-700' : 'bg-emerald-50 text-emerald-700';
                
                // Fixed Fallback string literal syntax to safely clear raw code leakage
                const fallbackImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23CBD5E1" stroke-width="1"><rect width="24" height="24" fill="%23F1F5F9"/><path d="M5 21h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
                const cardImage = (item.image && item.image.trim() !== "") ? item.image : fallbackImg;

                publicGrid.innerHTML += `
                    <div class="bg-white border border-slate-200/80 rounded-2xl overflow-hidden shadow-sm flex flex-col justify-between">
                        <div>
                            <div class="w-full bg-slate-50 border-b border-slate-100 relative flex items-center justify-center p-4 min-h-[260px] max-h-[320px]">
                                <img src="${cardImage}" alt="${item.name}" class="max-w-full max-h-[280px] w-auto h-auto object-contain rounded-xl shadow-sm transition-transform duration-500 hover:scale-[1.03]">
                                <span class="absolute top-4 left-4 text-[10px] ${badgeColorClass} font-extrabold px-2.5 py-1 rounded-full uppercase tracking-wider shadow-sm z-10">${item.status}</span>
                            </div>
                            
                            <div class="p-6">
                                <span class="text-[10px] text-slate-400 font-mono tracking-wider block mb-1">${item.sku}</span>
                                <h3 class="text-base font-bold text-slate-900 mb-2">${item.name}</h3>
                                <p class="text-xs text-slate-500 leading-relaxed">${item.desc}</p>
                            </div>
                        </div>
                        <div class="mx-6 pb-6 pt-4 border-t border-slate-100 text-xs flex justify-between font-medium text-slate-600">
                            <span>Available Vol: <strong class="text-slate-900">${item.volume}</strong></span>
                            <a href="contact.html" class="text-emerald-600 hover:underline font-bold">Lock Batch &rarr;</a>
                        </div>
                    </div>
                `;
            });
        }
        document.addEventListener('DOMContentLoaded', renderStockInterface);
    </script>
</body>
</html>
